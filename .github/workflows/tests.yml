name: tests

on:
  pull_request:
    branches:
      - main
      - release/**
      - feature/**
  push:
    branches:
      - main
      - release/**
      - feature/**

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release

      - name: Run unit and architecture tests
        run: |
          dotnet test EFlow.Shared/EFlow.Common.UnitTests/EFlow.Common.UnitTests.csproj --no-build --configuration Release --logger "trx;LogFileName=eflow-common-unit-tests.trx" --results-directory TestResults/unit-and-arch
          dotnet test EFlow.Booking/Tests/EFlow.Booking.UnitTests/EFlow.Booking.UnitTests.csproj --no-build --configuration Release --logger "trx;LogFileName=eflow-booking-unit-tests.trx" --results-directory TestResults/unit-and-arch
          dotnet test EFlow.Notifications/Tests/EFlow.Notifications.UnitTests/EFlow.Notifications.UnitTests.csproj --no-build --configuration Release --logger "trx;LogFileName=eflow-notifications-unit-tests.trx" --results-directory TestResults/unit-and-arch
          dotnet test EFlow.Booking/Tests/EFlow.Booking.ArchitectureTests/EFlow.Booking.ArchitectureTests.csproj --no-build --configuration Release --logger "trx;LogFileName=eflow-booking-architecture-tests.trx" --results-directory TestResults/unit-and-arch

      - name: Run integration tests
        run: |
          dotnet test EFlow.Booking/Tests/EFlow.Booking.IntegrationTests/EFlow.Booking.IntegrationTests.csproj --no-build --configuration Release --logger "trx;LogFileName=eflow-booking-integration-tests.trx" --results-directory TestResults/integration

      - name: Run API tests
        run: |
          dotnet test EFlow.Booking/Tests/EFlow.Booking.ApiTests/EFlow.Booking.ApiTests.csproj --no-build --configuration Release --logger "trx;LogFileName=eflow-booking-api-tests.trx" --results-directory TestResults/api
