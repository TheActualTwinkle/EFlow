name: booking-api-tests

on:
  pull_request:
    branches:
      - main
      - release/**
      - feature/**
  push:
    branches:
      - main
      - release/**
      - feature/**

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Booking API Test
        run: |
          bash scripts/test/run_booking_api_tests.sh --base-url http://localhost:8081 --wait-seconds 180
