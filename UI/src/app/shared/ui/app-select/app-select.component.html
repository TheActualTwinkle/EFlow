<div class="custom-select" [class.open]="open">
  <button type="button" (click)="toggle()" [disabled]="disabled || !options.length" [attr.aria-label]="ariaLabel || selectedLabel">
    <span>{{ options.length ? selectedLabel : emptyLabel }}</span>
    @if (suffixIcon) {
      <app-icon [name]="suffixIcon" />
    }
  </button>

  @if (open) {
    <div class="custom-select-menu">
      @for (option of options; track option.value) {
        <button type="button" [class.selected]="value === option.value" [disabled]="option.disabled" (click)="select(option)">
          {{ option.label }}
        </button>
      }
    </div>
  }
</div>
