name: eflow-prod
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456789}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-postgres} >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka:
    image: apache/kafka:4.1.0
    restart: unless-stopped
    user: "0"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: 1
    ports:
      - "${KAFKA_PORT:-19092}:9092"
    volumes:
      - ./data/kafka:/tmp/kafka-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5

  booking-api:
    image: eflow-booking-api:${IMAGE_TAG:?IMAGE_TAG is required}
    build:
      context: ..
      dockerfile: EFlow.Booking/Presentation/EFlow.Booking.WebApi/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AdminConfiguration__Username: ${ADMIN_USERNAME?ADMIN_USERNAME is required}
      AdminConfiguration__Password: ${ADMIN_PASSWORD?ADMIN_PASSWORD is required}
      AdminConfiguration__Email: ${ADMIN_EMAIL?ADMIN_EMAIL is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: ${JWT_ISSUER:-https://${APP_DOMAIN_NAME}}
      Jwt__Audience: ${JWT_AUDIENCE:-https://${APP_DOMAIN_NAME}}
      Jwt__ExpireMinutes: ${JWT_EXPIRE_MINUTES:-1440}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN_0?CORS_ALLOWED_ORIGIN_0 is required}
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-eflow};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-123456789}
      ConnectionStrings__HangfireDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-eflow};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-123456789}
      KafkaSettings__BootstrapServers: kafka:9092
    expose:
      - "${BOOKING_API_PORT:-8081}"

  notifications-api:
    image: eflow-notifications-api:${IMAGE_TAG:?IMAGE_TAG is required}
    build:
      context: ..
      dockerfile: EFlow.Notifications/Presentation/EFlow.Notifications.WebApi/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__HangfireDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-eflow};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-123456789}
      KafkaSettings__BootstrapServers: kafka:9092
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: ${JWT_ISSUER:-https://${APP_DOMAIN_NAME}}
      Jwt__Audience: ${JWT_AUDIENCE:-https://${APP_DOMAIN_NAME}}
      Jwt__ExpireMinutes: 5
      Smtp__Host: ${SMTP_HOST?SMTP_HOST is required}
      Smtp__Port: ${SMTP_PORT?SMTP_PORT is required}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL?SMTP_FROM_EMAIL is required}
      Smtp__FromName: ${SMTP_FROM_NAME?SMTP_FROM_NAME is required}
      Smtp__SecureSocketOptions: ${SMTP_SECURE_SOCKET_OPTIONS:-Auto}

  ui:
    image: eflow-ui:${IMAGE_TAG:?IMAGE_TAG is required}
    build:
      context: ..
      dockerfile: UI/Dockerfile
    restart: unless-stopped
    depends_on:
      - booking-api
    expose:
      - "80"
    
  caddy:
    image: eflow-caddy:${IMAGE_TAG:?IMAGE_TAG is required}
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    restart: unless-stopped
    environment:
      APP_DOMAIN_NAME: ${APP_DOMAIN_NAME:?APP_DOMAIN_NAME is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
